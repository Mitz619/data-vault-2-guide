<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif">
  <rect width="900" height="620" fill="#0f1117"/>

  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#e8eaf0">Data Vault 2.0 — Architecture Layers</text>
  <text x="450" y="56" text-anchor="middle" font-size="12" fill="#7a8899">Hard rules before the vault · Soft rules after · INSERT-ONLY always</text>

  <!-- SOURCE -->
  <rect x="40" y="76" width="820" height="64" rx="8" fill="#0d1a2e" stroke="#2a4a6e" stroke-width="1.5"/>
  <text x="450" y="101" text-anchor="middle" font-size="13" font-weight="600" fill="#7eb8f7">SOURCE SYSTEMS</text>
  <text x="450" y="121" text-anchor="middle" font-size="11" fill="#4a6a8e">CRM  |  ERP  |  Order Management System  |  Contact Centre (Genesys)  |  WFM  |  Web Analytics</text>

  <!-- arrow -->
  <line x1="450" y1="140" x2="450" y2="158" stroke="#3a5a7e" stroke-width="2"/>
  <polygon points="445,158 455,158 450,167" fill="#3a5a7e"/>
  <text x="470" y="153" font-size="10" fill="#4a6a8e">raw extract</text>

  <!-- STAGING -->
  <rect x="40" y="168" width="820" height="64" rx="8" fill="#0e1f0e" stroke="#2a5a2a" stroke-width="1.5"/>
  <text x="450" y="193" text-anchor="middle" font-size="13" font-weight="600" fill="#6fcf6f">STAGING LAYER  (STG_)</text>
  <text x="450" y="213" text-anchor="middle" font-size="11" fill="#3a6a3a">Land data as-is · HARD rules only: typing · deduplication · compute _HK hash keys · stamp LOAD_DTS + REC_SRC · scrub PII</text>

  <!-- arrow -->
  <line x1="450" y1="232" x2="450" y2="250" stroke="#3a6a3a" stroke-width="2"/>
  <polygon points="445,250 455,250 450,259" fill="#3a6a3a"/>
  <text x="470" y="245" font-size="10" fill="#3a6a3a">INSERT-ONLY</text>

  <!-- RAW VAULT -->
  <rect x="40" y="260" width="820" height="88" rx="8" fill="#1a0a2e" stroke="#5a2d82" stroke-width="2"/>
  <text x="450" y="285" text-anchor="middle" font-size="13" font-weight="700" fill="#ce93d8">RAW DATA VAULT</text>
  <text x="130" y="308" text-anchor="middle" font-size="11" fill="#81c784">Hubs (HUB_)</text>
  <text x="130" y="322" text-anchor="middle" font-size="10" fill="#4a7a4e">Unique business keys</text>
  <text x="130" y="334" text-anchor="middle" font-size="10" fill="#4a7a4e">Inserted once, never updated</text>
  <line x1="250" y1="295" x2="250" y2="348" stroke="#3a1a5e" stroke-width="1"/>
  <text x="450" y="308" text-anchor="middle" font-size="11" fill="#ce93d8">Links (LNK_)</text>
  <text x="450" y="322" text-anchor="middle" font-size="10" fill="#7b4fa0">Relationships between Hubs</text>
  <text x="450" y="334" text-anchor="middle" font-size="10" fill="#7b4fa0">No dates · No amounts · Keys only</text>
  <line x1="640" y1="295" x2="640" y2="348" stroke="#3a1a5e" stroke-width="1"/>
  <text x="770" y="308" text-anchor="middle" font-size="11" fill="#ffcc02">Satellites (SAT_)</text>
  <text x="770" y="322" text-anchor="middle" font-size="10" fill="#7a5c00">Descriptive attributes + history</text>
  <text x="770" y="334" text-anchor="middle" font-size="10" fill="#7a5c00">New row on every change</text>
  <text x="450" y="348" text-anchor="middle" font-size="10" fill="#3a1a5e" font-style="italic">No business rules · Full audit trail · INSERT-ONLY</text>

  <!-- arrow -->
  <line x1="450" y1="348" x2="450" y2="366" stroke="#5a2d82" stroke-width="2"/>
  <polygon points="445,366 455,366 450,375" fill="#5a2d82"/>
  <text x="470" y="361" font-size="10" fill="#7a4fa0">soft rules applied</text>

  <!-- BUSINESS VAULT -->
  <rect x="40" y="376" width="820" height="54" rx="8" fill="#1a100a" stroke="#7a4a00" stroke-width="1.5"/>
  <text x="450" y="399" text-anchor="middle" font-size="13" font-weight="600" fill="#ffa040">BUSINESS VAULT  (BHUB_ / BLNK_ / BSAT_)</text>
  <text x="450" y="418" text-anchor="middle" font-size="11" fill="#7a4a00">Soft business rules applied: scoring · classification · derivation · aggregation · key alignment · still INSERT-ONLY</text>

  <!-- arrow -->
  <line x1="450" y1="430" x2="450" y2="448" stroke="#7a4a00" stroke-width="2"/>
  <polygon points="445,448 455,448 450,457" fill="#7a4a00"/>
  <text x="490" y="443" font-size="10" fill="#7a4a00">disposable — rebuilt from vault</text>

  <!-- INFORMATION MART -->
  <rect x="40" y="458" width="820" height="74" rx="8" fill="#0d1a2e" stroke="#1a6b9a" stroke-width="1.5"/>
  <text x="450" y="482" text-anchor="middle" font-size="13" font-weight="600" fill="#4fc3f7">INFORMATION MART</text>
  <text x="180" y="504" text-anchor="middle" font-size="11" fill="#4fc3f7">PIT tables</text>
  <text x="180" y="518" text-anchor="middle" font-size="9" fill="#1a5a7a">Snapshot LOAD_DTS per satellite</text>
  <line x1="310" y1="488" x2="310" y2="530" stroke="#0a3a5e" stroke-width="1"/>
  <text x="450" y="504" text-anchor="middle" font-size="11" fill="#81d4fa">Bridge tables</text>
  <text x="450" y="518" text-anchor="middle" font-size="9" fill="#1a5a7a">Pre-join Hub+Link keys for fast queries</text>
  <line x1="600" y1="488" x2="600" y2="530" stroke="#0a3a5e" stroke-width="1"/>
  <text x="740" y="504" text-anchor="middle" font-size="11" fill="#b3e5fc">Star schema (RPT_ / VDIM_ / VF_)</text>
  <text x="740" y="518" text-anchor="middle" font-size="9" fill="#1a5a7a">Flat denormalised tables / views for BI tools</text>
  <text x="450" y="530" text-anchor="middle" font-size="9" fill="#0a3a5e" font-style="italic">Disposable — can be dropped and rebuilt from the Raw Vault at any time</text>

  <!-- arrow -->
  <line x1="450" y1="532" x2="450" y2="550" stroke="#1a6b9a" stroke-width="2"/>
  <polygon points="445,550 455,550 450,559" fill="#1a6b9a"/>

  <!-- CONSUMPTION -->
  <rect x="40" y="560" width="820" height="44" rx="8" fill="#0a0f1a" stroke="#2a3a50" stroke-width="1"/>
  <text x="450" y="580" text-anchor="middle" font-size="13" font-weight="600" fill="#90a4ae">CONSUMPTION LAYER</text>
  <text x="450" y="596" text-anchor="middle" font-size="11" fill="#4a5a6e">Power BI  |  Tableau  |  Excel  |  REST API  |  ML Feature Store  |  Operational Reporting</text>
</svg>
